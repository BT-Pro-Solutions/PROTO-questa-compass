<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compass — My Listings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1.0.2">
</head>
<body class="page-provider">
    <header class="site-header">
        <a href="index.html" class="site-logo" aria-label="Questa Compass">
            <img class="site-logo__circle" src="assets/logo-circle.svg" alt="">
            <img class="site-logo__text" src="assets/logo-text.svg" alt="" aria-hidden="true">
        </a>
        <div class="site-header__actions">
            <button class="language-btn" type="button" aria-label="Select language">
                <img src="assets/language.png" alt="Language / Idioma / ဘာသာစကား">
            </button>
            <a href="#" class="btn-login js-login">Log In</a>
        </div>
    </header>

    <div data-user-nav data-active-nav="provider-services"></div>

    <section class="portal-hero">
        <div class="portal-hero__icon" aria-hidden="true">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <rect x="8" y="7" width="24" height="26" rx="3" stroke="currentColor" stroke-width="2.5"/>
                <path d="M14 15h12M14 21h12M14 27h7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>
        <h1 class="portal-hero__title">My Listings</h1>
        <p class="portal-hero__subtitle">Resources added by or assigned to your provider account.</p>
    </section>

    <main class="portal-content">
        <div class="provider-services">
            <a href="provider-add-listing.html" class="builder-btn builder-btn--primary">Add Single Listing</a>
            <a href="provider-add-listings-bulk.html" class="builder-btn builder-btn--secondary">Add Multiple Listings</a>
        </div>

        <section class="portal-section">
            <div class="provider-listings-toolbar">
                <label class="results-sort">
                    <span class="results-sort__label">Sort By</span>
                    <select class="results-sort__select" id="listingsSortSelect">
                        <option value="status" selected>Status</option>
                        <option value="newest">Newest</option>
                        <option value="alphabetical">Alphabetical</option>
                    </select>
                </label>
            </div>

            <div class="provider-resource-list" id="providerResourceList"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p class="site-footer__copyright">&copy; 2026 Questa Education Foundation</p>
        <nav class="site-footer__links" aria-label="Footer links">
            <a href="#">Share Your Feedback</a>
            <a href="#">Take a Break</a>
            <a href="#">Privacy Policy</a>
            <a href="provider-login.html">Provider Login</a>
        </nav>
    </footer>

    <script src="auth.js?v=1.0.5"></script>
    <script src="provider-listings-data.js"></script>
    <script src="provider-resources.js"></script>
</body>
</html>
